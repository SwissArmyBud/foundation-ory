version: '3.7'
services:

  traefik:
    image: traefik:v${TRAEFIK_VERSION}
    env_file: 
      - path: .env
        required: true
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      # Public
      - "--entrypoints.web-insecure.address=:80"
      - "--entrypoints.web-secure.address=:443"
      # Admin
      - "--entrypoints.admin-secure.address=:${ADMIN_PORT}"
      - "--entrypoints.tcp-smtp.address=:1025"
      # ACME STG configuration
      - "--certificatesresolvers.stg.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.stg.acme.email=${ACME_CERTIFICATE_EMAIL}"
      - "--certificatesresolvers.stg.acme.storage=/acme/stg.json"
      - "--certificatesresolvers.stg.acme.tlschallenge=true"
      # ACME PRD configuration
      - "--certificatesresolvers.prd.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.prd.acme.email=${ACME_CERTIFICATE_EMAIL}"
      - "--certificatesresolvers.prd.acme.storage=/acme/prd.json"
      - "--certificatesresolvers.prd.acme.tlschallenge=true"
    labels:
      # TRAEFIK
      # HTTPS-Redirect Middleware
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      # Prefix-stripping Middleware
      - "traefik.http.middlewares.prefix-strip.stripprefix.prefixes=${KRATOS_PUBLIC_PATH},${KRATOS_ADMIN_PATH},${HYDRA_PUBLIC_PATH},${HYDRA_ADMIN_PATH},${KETO_PUBLIC_PATH},${KETO_ADMIN_PATH}"
      # DASHBOARD
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_SUBDOMAIN}.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=admin-secure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=${ACME_DEFAULT_RESOLVER}"
    ports:
      - "80:80"
      - "443:443"
      - "${ADMIN_PORT}:${ADMIN_PORT}"
      - "1025:1025"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./net/acme:/acme
    networks:
      - ory_network

networks:
  ory_network:
    external: true
