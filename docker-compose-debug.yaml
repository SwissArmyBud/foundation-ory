# whoami.yml
services:
  # WHOAMI - Path-routed to standard web service behind admin entrypoint
  whoami:
    image: traefik/whoami
    env_file: 
      - path: .env
        required: true
    labels:
      # Traefik-aware
      - "traefik.enable=true"
      # Path-routed from "auth" subdomain
      - "traefik.http.routers.whoami.rule= Host(`${SERVICE_DOMAIN}`) && PathPrefix(`${WHOAMI_PUBLIC_PATH}`)"
      # Admin HTTPS Ingress
      - "traefik.http.routers.whoami.entrypoints=admin-secure"
      - "traefik.http.routers.whoami.tls=true"
      # Production ACME Cert
      - "traefik.http.routers.whoami.tls.certresolver=${ACME_DEFAULT_RESOLVER}"
      # Middleware list
      - "traefik.http.routers.whoami.middlewares=prefix-strip"
    networks:
      - ory_network
